services:

  freeswitch:
    hostname: docker-fs
    image: safarov/freeswitch:latest
    container_name: freeswitch
    restart: unless-stopped
    network_mode: host
    volumes:
      # vanilla templates (used on first-run copy)
      - ./docker/event_socket.conf.xml:/usr/share/freeswitch/conf/vanilla/autoload_configs/event_socket.conf.xml
      - ./docker/acl.conf.xml:/usr/share/freeswitch/conf/vanilla/autoload_configs/acl.conf.xml
      - ./docker/modules.conf.xml:/usr/share/freeswitch/conf/vanilla/autoload_configs/modules.conf.xml
      - ./docker/vars.xml:/usr/share/freeswitch/conf/vanilla/vars.xml
      - ./docker/sip_profiles/internal.xml:/usr/share/freeswitch/conf/vanilla/sip_profiles/internal.xml
      - ./docker/sip_profiles/internal-ipv6.xml:/usr/share/freeswitch/conf/vanilla/sip_profiles/internal-ipv6.xml
      - ./docker/directory:/usr/share/freeswitch/conf/vanilla/directory
      - ./docker/dialplan:/usr/share/freeswitch/conf/vanilla/dialplan
      - ./docker/xml_curl.conf.xml:/usr/share/freeswitch/conf/vanilla/autoload_configs/xml_curl.conf.xml
      # runtime config (always in effect regardless of first-run state)
      - ./docker/event_socket.conf.xml:/etc/freeswitch/autoload_configs/event_socket.conf.xml
      - ./docker/acl.conf.xml:/etc/freeswitch/autoload_configs/acl.conf.xml
      - ./docker/modules.conf.xml:/etc/freeswitch/autoload_configs/modules.conf.xml
      - ./docker/vars.xml:/etc/freeswitch/vars.xml
      - ./docker/sip_profiles/internal.xml:/etc/freeswitch/sip_profiles/internal.xml
      - ./docker/sip_profiles/internal-ipv6.xml:/etc/freeswitch/sip_profiles/internal-ipv6.xml
      - ./docker/directory:/etc/freeswitch/directory
      - ./docker/dialplan:/etc/freeswitch/dialplan
      - ./docker/xml_curl.conf.xml:/etc/freeswitch/autoload_configs/xml_curl.conf.xml
    cap_add:
      - SYS_NICE
      - NET_ADMIN

  postgres:
    image: postgres:15-alpine
    container_name: fusionpbx_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: custompbx
      POSTGRES_USER: custompbx
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U custompbx"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fs_net
    volumes:
      - ./docker/postgres_data:/var/lib/postgresql/data   # ← added
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh 
  custompbx:
    image: ghcr.io/custompbx/custompbx:latest
    container_name: custompbx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./docker/config.json:/app/config.json
    depends_on:
      postgres:
        condition: service_healthy
      freeswitch:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - custompbx

networks:
  fs_net:
    driver: bridge
